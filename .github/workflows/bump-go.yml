name: Bump Go Version

on:
  schedule:
    - cron: "0 12 * * 3" # Every Wednesday at noon UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop

      - name: Check latest Go version
        id: check
        run: |
          LATEST=$(curl -sL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/go//')
          CURRENT=$(grep '^go ' go.mod | awk '{print $2}')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update go.mod
        if: steps.check.outputs.needs_update == 'true'
        run: |
          go mod edit -go=${{ steps.check.outputs.latest }}
          go mod tidy

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/bump-go-${{ steps.check.outputs.latest }}
          commit-message: "chore(deps): bump Go from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}"
          title: "chore(deps): bump Go from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}"
          body: |
            Auto-generated PR to update Go version in go.mod.

            - Current: `${{ steps.check.outputs.current }}`
            - Latest: `${{ steps.check.outputs.latest }}`
          base: develop