name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Ensure go.mod is tidy
        run: |
          go mod tidy
          if [ -n "$(git diff -- go.mod go.sum)" ]; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Go vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Integration tests
        run: make integration
        env:
          COPIA_TEST_TOKEN: ${{ secrets.COPIA_TEST_TOKEN }}
          COPIA_TEST_HOST: ${{ secrets.COPIA_TEST_HOST }}
          COPIA_TEST_OWNER: ${{ secrets.COPIA_TEST_OWNER }}
          COPIA_TEST_REPO: ${{ secrets.COPIA_TEST_REPO }}