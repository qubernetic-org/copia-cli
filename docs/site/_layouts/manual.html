<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="manual">
  <div>
    <header>
      <nav class="d-flex flex-content-center flex-justify-between mx-auto px-3 px-md-6">
        <a class="d-flex mr-4 flex-items-center f4-mktg color-fg-default" href="{{ '/' | relative_url }}" style="text-decoration: none;">
          <img src="https://docs.copia.io/docs/~gitbook/image?url=https%3A%2F%2F3704730939-files.gitbook.io%2F%7E%2Ffiles%2Fv0%2Fb%2Fgitbook-x-prod.appspot.com%2Fo%2Fspaces%252F4lSQNVI3DZ15V7kjkMCA%252Flogo%252FoS4sv6taHNXys0LbgDWT%252FLogo_Hotdog_WhiteTeal.svg%3Falt%3Dmedia%26token%3Db48bb6cc-69f3-49ce-a903-40401f3a3086&amp;width=260&amp;dpr=3&amp;quality=100&amp;sign=1f7646d8&amp;sv=2" alt="Copia" height="28" class="mr-2" style="transform: translateY(-0.5px);">
          <span style="font-size: 20px; letter-spacing: 1px;">CLI</span>
        </a>
        <div class="d-flex flex-auto flex-items-center flex-justify-end">
          <a href="{{ '/manual/' | relative_url }}" class="d-inline-block f5-mktg py-4 mr-4 color-fg-default" style="text-decoration: none;">Manual</a>
          <a href="https://github.com/qubernetic/copia-cli/releases" class="d-inline-block f5-mktg py-4 mr-4 color-fg-default" style="text-decoration: none;">Release notes</a>
        </div>
      </nav>
    </header>
  </div>

  <div class="d-flex flex-wrap flex-justify-center">
    <div class="col-lg-2">
      <div class="height-full">
        <nav aria-label="CLI commands" class="docs-nav d-lg-flex flex-column p-6">
          <ul class="list-style-none">
            {% include sidebar.html %}
          </ul>
        </nav>
      </div>
    </div>

    <main id="main" class="main-content color-bg-subtle markdown-body col-12 col-lg-10 pt-7 pb-12 px-3 px-md-6">
      <div class="container-lg">
        {{ content }}
      </div>
    </main>
  </div>
</body>
</html>
