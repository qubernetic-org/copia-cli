version: 2
project_name: copia-cli

builds:
  - id: copia-cli
    main: ./cmd/copia-cli
    binary: copia-cli
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    goarm:
      - "6"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X github.com/qubernetic/copia-cli/internal/build.Version={{.Version}}
      - -X github.com/qubernetic/copia-cli/internal/build.Date={{time "2006-01-02"}}
    env:
      - CGO_ENABLED=0

universal_binaries:
  - id: copia-cli-macos
    ids:
      - copia-cli
    replace: true
    name_template: "copia-cli"

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: qubernetic
    name: copia-cli
  draft: true
  prerelease: auto

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: qubernetic
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/qubernetic/copia-cli"
    description: "CLI for Copia — source control for industrial automation"
    license: "AGPL-3.0"
    install: |
      bin.install "copia-cli"
    test: |
      system "#{bin}/copia-cli", "--version"

nfpms:
  - id: copia-cli
    package_name: copia-cli
    vendor: Qubernetic
    homepage: "https://github.com/qubernetic/copia-cli"
    maintainer: "Qubernetic <hello@qubernetic.io>"
    description: "CLI for Copia — source control for industrial automation"
    license: AGPL-3.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/copia-cli/LICENSE

changelog:
  use: github-native
