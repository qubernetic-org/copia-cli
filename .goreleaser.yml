version: 2
project_name: copia-cli

builds:
  - id: copia-cli
    main: ./cmd/copia-cli
    binary: copia-cli
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/qubernetic/copia-cli/internal/build.Version={{.Version}}
      - -X github.com/qubernetic/copia-cli/internal/build.Date={{time "2006-01-02"}}
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: qubernetic
    name: copia-cli
  draft: true
  prerelease: auto

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: qubernetic
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/qubernetic/copia-cli"
    description: "CLI for Copia — source control for industrial automation"
    license: "MIT"
    install: |
      bin.install "copia-cli"
    test: |
      system "#{bin}/copia-cli", "--version"

changelog:
  use: github-native
